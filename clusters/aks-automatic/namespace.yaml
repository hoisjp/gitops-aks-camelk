apiVersion: v1
kind: Namespace
metadata:
  name: gitops-demo
  labels:
    app.kubernetes.io/managed-by: flux
    # Enforce baseline Pod Security to mirror the guardrails AKS Automatic applies
    # cluster-wide. The podinfo workload in this namespace is compliant, proving
    # that compliant GitOps workloads run under the enforced baseline.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
